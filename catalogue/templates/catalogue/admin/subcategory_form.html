{% extends "core/base.html" %}
{% block title %}{{ action }} Subcategory — Red Devils Hub{% endblock %}
{% block content %}
<section class="container my-5">
    <div class="section-box" style="max-width:600px; margin:auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-tag text-danger me-2"></i>{{ action }} Subcategory</h3>
            <a href="{% url 'catalogue:admin_category_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label fw-semibold">Parent Category</label>{{ form.category }}</div>
            <div class="mb-3"><label class="form-label fw-semibold">Name</label>{{ form.name }}</div>
            <div class="mb-3"><label class="form-label fw-semibold">Description</label>{{ form.description }}</div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-danger"><i class="bi bi-save me-1"></i>{{ action }} Subcategory</button>
                <a href="{% url 'catalogue:admin_category_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}

{% extends "core/base.html" %}
{% block title %}Delete Product — Red Devils Hub{% endblock %}
{% block content %}
<section class="container my-5">
    <div class="section-box text-center" style="max-width:500px; margin:auto;">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem;"></i>
        <h4 class="fw-bold mt-3">Delete Product?</h4>
        <p class="text-muted">You are about to permanently delete <strong>{{ product.name }}</strong>. This cannot be undone.</p>
        <form method="POST" class="d-flex justify-content-center gap-3 mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
            <a href="{% url 'catalogue:admin_product_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}

{% extends "core/base.html" %}
{% block title %}{{ action }} Player Stat — Red Devils Hub{% endblock %}
{% block content %}
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="section-box p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-person-fill text-danger me-2"></i>{{ action }} Player Stat</h4>
                    <a href="{% url 'gold_hub:admin_gold_hub' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                </div>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        {% for field in form %}
                        <div class="col-md-{% if field.name == 'name' or field.name == 'season' %}6{% elif field.name == 'image' %}12{% else %}4{% endif %}">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-danger w-100 mt-4">
                        <i class="bi bi-check-lg me-1"></i>{{ action }} Player
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}

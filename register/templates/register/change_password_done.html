{% extends "core/base.html" %}
{% block title %}Password Changed — Red Devils Hub{% endblock %}
{% block content %}
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="section-box text-center">
                <i class="bi bi-shield-check text-success" style="font-size:3rem;"></i>
                <h4 class="fw-bold mt-3 mb-2">Password Updated!</h4>
                <p class="text-muted mb-4">Your password has been changed successfully.</p>
                <a href="{% url 'register:profile_dashboard' %}" class="btn btn-danger px-5">
                    Back to Profile
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}

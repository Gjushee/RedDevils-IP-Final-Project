{% extends "core/base.html" %}
{% block title %}Confirm Delete — Red Devils Hub{% endblock %}
{% block content %}
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="section-box p-4 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
                <h4 class="fw-bold mb-2">Are you sure?</h4>
                <p class="text-muted mb-4">{{ title }}</p>
                <div class="d-flex gap-3 justify-content-center">
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash3 me-1"></i>Yes, Delete
                        </button>
                    </form>
                    <a href="{% url cancel_url %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
